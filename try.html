<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألبوم الحب</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            transition: background-color 0.5s, color 0.5s;
        }

        /* خلفية متحركة خفيفة */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            transition: background-color 0.5s;
        }

        /* قلوب متحركة (خفيفة) */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.15;
        }

        .heart-bg {
            position: absolute;
            color: #ff9a9e;
            font-size: 20px;
            animation: floatHeart 15s linear infinite;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* شاشة التحميل */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fbc2c2, #fda4a4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s;
        }

        .loading-spinner {
            text-align: center;
            color: white;
        }

        .loading-spinner i {
            font-size: 50px;
            margin-bottom: 20px;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* شاشة كلمة السر */
        .password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #fbc2c2, #fda4a4);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1500;
            transition: opacity 0.5s;
        }

        .password-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(253, 121, 168, 0.3);
        }

        .password-box i {
            font-size: 60px;
            color: #fd79a8;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .password-box h2 {
            color: #2d2d2d;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .password-box p {
            color: #fd79a8;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .password-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #fbc2c2;
            border-radius: 15px;
            font-size: 16px;
            margin-bottom: 20px;
            font-family: 'Cairo', sans-serif;
            text-align: center;
        }

        .password-input:focus {
            outline: none;
            border-color: #fd79a8;
        }

        .password-btn {
            background: linear-gradient(135deg, #fd79a8, #fda4a4);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s;
            width: 100%;
            font-family: 'Cairo', sans-serif;
        }

        .password-btn:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #e74c3c;
            margin-top: 15px;
            display: none;
        }

        /* المحتوى الرئيسي */
        .main-content {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* الهيدر */
        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 15px 25px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 2px solid rgba(253, 121, 168, 0.3);
            transition: all 0.3s;
        }

        .header.floating {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            max-width: 900px;
            margin: 0 auto;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 10px 30px rgba(253, 121, 168, 0.2);
        }

        .names {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 600;
            color: white;
        }

        .names i {
            color: #fd79a8;
        }

        .counter-badge {
            background: rgba(253, 121, 168, 0.2);
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .counter-badge i {
            color: #fd79a8;
        }

        /* البلوكات */
        .blocks-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin: 30px 0;
        }

        .block {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid rgba(253, 121, 168, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
            color: white;
        }

        .block:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(253, 121, 168, 0.2);
        }

        /* زخرفة خفيفة */
        .block::after {
            content: '❤️';
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 30px;
            opacity: 0.1;
            transform: rotate(-10deg);
        }

        .block-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .block-title i {
            color: #fd79a8;
        }

        /* كتابة متحركة */
        .typing-text {
            font-size: 18px;
            line-height: 1.8;
            white-space: pre-wrap;
            position: relative;
            padding-right: 15px;
        }

        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 20px;
            background: #fd79a8;
            margin-right: 5px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* الصور */
        .image-block img {
            max-width: 100%;
            border-radius: 20px;
            border: 3px solid rgba(253, 121, 168, 0.3);
        }

        /* الرسالة المخفية */
        .hidden-trigger {
            background: none;
            border: 2px dashed #fd79a8;
            padding: 15px;
            border-radius: 20px;
            width: 100%;
            color: #fd79a8;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .hidden-trigger:hover {
            background: rgba(253, 121, 168, 0.1);
        }

        .hidden-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease, margin 0.5s ease, opacity 0.5s ease;
            margin-top: 0;
            opacity: 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .hidden-content.show {
            max-height: 1000px;
            margin-top: 20px;
            opacity: 1;
            padding: 20px;
        }

        /* العداد */
        .counter-block {
            text-align: center;
        }

        .counter-display {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .counter-item {
            text-align: center;
        }

        .counter-number {
            font-size: 48px;
            font-weight: 700;
            color: #fd79a8;
            line-height: 1;
        }

        .counter-label {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* الفيديو */
        .video-wrapper {
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid rgba(253, 121, 168, 0.3);
        }

        .video-wrapper video {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
        }

        /* مشغل الموسيقى العائم */
        .music-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .music-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #fd79a8, #fda4a4);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(253, 121, 168, 0.5);
            transition: transform 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .music-btn:hover {
            transform: scale(1.1);
        }

        .music-tooltip {
            background: rgba(255, 255, 255, 0.9);
            color: #fd79a8;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
        }

        .music-float:hover .music-tooltip {
            opacity: 1;
        }

        /* الفوتر */
        .footer {
            text-align: center;
            padding: 40px 0;
            color: rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(253, 121, 168, 0.3);
            margin-top: 50px;
        }

        .footer i {
            color: #fd79a8;
        }

        /* رسالة خطأ */
        .error-page {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fbc2c2, #fda4a4);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .error-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
        }

        .error-box i {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .error-box h2 {
            font-size: 30px;
            margin-bottom: 10px;
        }

        /* ريسبونسيف */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .counter-display {
                gap: 15px;
            }
            
            .counter-number {
                font-size: 36px;
            }
            
            .names {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="background-layer" id="backgroundLayer"></div>
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- شاشة التحميل -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner">
            <i class="fas fa-heart"></i>
            <h3>جاري تحميل الذكريات...</h3>
        </div>
    </div>

    <!-- شاشة كلمة السر -->
    <div class="password-screen" id="passwordScreen" style="display: none;">
        <div class="password-box">
            <i class="fas fa-lock"></i>
            <h2 id="passwordTitle">أول يوم تعارفنا</h2>
            <p id="passwordHint"></p>
            <input type="text" class="password-input" id="passwordInput" placeholder="أدخل كلمة السر">
            <button class="password-btn" onclick="checkPassword()">ادخل للذكريات</button>
            <div class="error-message" id="errorMessage">
                <i class="fas fa-times"></i> كلمة السر غلط
            </div>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-content" id="mainContent" style="display: none;">
        <!-- الهيدر المتحرك -->
        <div class="header" id="mainHeader">
            <div class="names" id="namesDisplay">
                <i class="fas fa-heart"></i>
                <span id="senderName">...</span>
                <i class="fas fa-heart"></i>
                <span id="receiverName">...</span>
            </div>
            
            <div class="counter-badge" id="headerCounter">
                <i class="far fa-clock"></i>
                <span id="counterText">...</span>
            </div>
        </div>

        <!-- البلوكات -->
        <div class="blocks-container" id="blocksContainer"></div>

        <!-- الفوتر -->
        <div class="footer">
            <p>بـ <i class="fas fa-heart"></i> لذكرانا</p>
        </div>
    </div>

    <!-- مشغل الموسيقى العائم -->
    <div class="music-float" id="musicFloat" style="display: none;">
        <button class="music-btn" onclick="toggleMusic()" id="musicBtn">
            <i class="fas fa-play" id="musicIcon"></i>
        </button>
        <div class="music-tooltip" id="musicTooltip">أغنية حب</div>
    </div>

    <!-- عنصر الصوت -->
    <audio id="bgAudio"></audio>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // ================== FIREBASE CONFIG ==================
        const firebaseConfig = {
            apiKey: "AIzaSyAEpVTV2bAzIal7FkEl3JadPvn0fkqpAF4",
            authDomain: "love-site-e2cb7.firebaseapp.com",
            databaseURL: "https://love-site-e2cb7-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "love-site-e2cb7",
            storageBucket: "love-site-e2cb7.appspot.com",
            messagingSenderId: "861816430901",
            appId: "1:861816430901:web:144adb8ebbc2ad966d6c7c"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ================== المتغيرات ==================
        let albumId = null;
        let albumData = null;
        let audio = document.getElementById('bgAudio');
        let isPlaying = false;
        let typingSpeed = 50;

        // ================== استخراج ID من الرابط ==================
        function getAlbumIdFromUrl() {
            const path = window.location.pathname; // /album/N99OEYQ2
            const match = path.match(/\/album\/([^\/]+)/);
            
            if (match && match[1]) {
                return match[1];
            }
            
            // كملاحظة: ممكن يكون في query string
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        // ================== تحميل بيانات الألبوم ==================
        async function loadAlbum() {
            albumId = getAlbumIdFromUrl();
            
            if (!albumId) {
                showError('لا يوجد كود ألبوم', 'يرجى التأكد من رابط الألبوم');
                return;
            }

            try {
                // جلب بيانات الألبوم
                const snapshot = await database.ref(`albums/${albumId}`).once('value');
                albumData = snapshot.val();

                if (!albumData) {
                    showError('الألبوم غير موجود', 'الكود غير صحيح أو الألبوم محذوف');
                    return;
                }

                console.log('✅ تم تحميل الألبوم:', albumData);

                // تطبيق الإعدادات الأساسية
                applyBasicSettings();

                // ترتيب البلوكات
                if (albumData.blocks) {
                    albumData.blocks = Object.values(albumData.blocks).sort((a, b) => a.order - b.order);
                }

                // تعيين سرعة الكتابة
                if (albumData.textSpeed === 'slow') typingSpeed = 80;
                else if (albumData.textSpeed === 'fast') typingSpeed = 30;
                else typingSpeed = 50;

                // تعيين البيانات الأساسية
                document.getElementById('senderName').textContent = albumData.senderName || 'حبيب';
                document.getElementById('receiverName').textContent = albumData.receiverName || 'حبيبة';
                document.getElementById('passwordHint').textContent = albumData.passwordHint || 'اكتب أول يوم قابلنا';

                // بدء العداد
                if (albumData.relationshipStartDate) {
                    startCounter(albumData.relationshipStartDate);
                }

                // عرض البلوكات
                renderBlocks();

                // تجهيز الموسيقى
                setupMusic();

                // تشغيل القلوب
                if (albumData.enableHearts) {
                    startHearts();
                }

                // إخفاء شاشة التحميل وإظهار شاشة كلمة السر
                setTimeout(() => {
                    document.getElementById('loadingScreen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loadingScreen').style.display = 'none';
                        document.getElementById('passwordScreen').style.display = 'flex';
                    }, 500);
                }, 1000);

            } catch (error) {
                console.error('❌ خطأ:', error);
                showError('حدث خطأ', 'يرجى المحاولة مرة أخرى');
            }
        }

        // ================== تطبيق الإعدادات الأساسية ==================
        function applyBasicSettings() {
            // لون الخلفية
            if (albumData.backgroundColor) {
                document.getElementById('backgroundLayer').style.backgroundColor = albumData.backgroundColor;
            }

            // لون النص
            if (albumData.textColor) {
                document.documentElement.style.setProperty('--text-color', albumData.textColor);
            }

            // لون الحدود (للرومانسية)
            const borderColor = albumData.borderColor || '#fd79a8';
            document.documentElement.style.setProperty('--border-color', borderColor);
        }

        // ================== عرض البلوكات ==================
        function renderBlocks() {
            const container = document.getElementById('blocksContainer');
            container.innerHTML = '';

            if (!albumData?.blocks || albumData.blocks.length === 0) {
                container.innerHTML = '<div class="block">لا توجد ذكريات بعد</div>';
                return;
            }

            albumData.blocks.forEach(block => {
                const blockElement = createBlock(block);
                if (blockElement) container.appendChild(blockElement);
            });
        }

        // ================== إنشاء بلوك ==================
        function createBlock(block) {
            const div = document.createElement('div');
            div.className = 'block';

            // لون مخصص للبلوك
            if (block.color) {
                div.style.borderColor = block.color;
            }

            // العنوان
            if (block.title) {
                const titleDiv = document.createElement('div');
                titleDiv.className = 'block-title';
                titleDiv.innerHTML = `
                    <i class="fas ${getIconForType(block.type)}"></i>
                    <span>${block.title}</span>
                `;
                div.appendChild(titleDiv);
            }

            // المحتوى حسب النوع
            switch (block.type) {
                case 'text':
                    const textDiv = document.createElement('div');
                    textDiv.className = 'typing-text';
                    textDiv.id = `typing-${Date.now()}-${Math.random()}`;
                    div.appendChild(textDiv);
                    
                    setTimeout(() => {
                        typeWriter(textDiv.id, block.content, typingSpeed);
                    }, 100);
                    break;

                case 'image':
                    const imageDiv = document.createElement('div');
                    imageDiv.className = 'image-block';
                    imageDiv.innerHTML = `<img src="${block.content}" alt="صورة" loading="lazy">`;
                    div.appendChild(imageDiv);
                    break;

                case 'hidden-message':
                    const trigger = document.createElement('button');
                    trigger.className = 'hidden-trigger';
                    trigger.innerHTML = `${block.title || 'رسالة سرية'} <i class="fas fa-heart"></i>`;
                    
                    const hiddenDiv = document.createElement('div');
                    hiddenDiv.className = 'hidden-content';
                    
                    const hiddenText = document.createElement('div');
                    hiddenText.className = 'typing-text';
                    hiddenText.textContent = block.content;
                    hiddenDiv.appendChild(hiddenText);
                    
                    trigger.onclick = () => hiddenDiv.classList.toggle('show');
                    
                    div.appendChild(trigger);
                    div.appendChild(hiddenDiv);
                    break;

                case 'counter':
                    div.classList.add('counter-block');
                    div.innerHTML += '<div class="counter-display" id="dynamicCounter"></div>';
                    break;

                case 'video':
                    const videoWrapper = document.createElement('div');
                    videoWrapper.className = 'video-wrapper';
                    videoWrapper.innerHTML = `
                        <video controls>
                            <source src="${block.content}" type="video/mp4">
                        </video>
                    `;
                    div.appendChild(videoWrapper);
                    break;

                case 'music':
                    // الموسيقى بتتعامل معاها بشكل منفصل
                    break;
            }

            return div;
        }

        // ================== أيقونات ==================
        function getIconForType(type) {
            const icons = {
                'text': 'fa-pen',
                'image': 'fa-image',
                'hidden-message': 'fa-lock',
                'counter': 'fa-clock',
                'video': 'fa-video'
            };
            return icons[type] || 'fa-heart';
        }

        // ================== كتابة متحركة ==================
        function typeWriter(elementId, text, speed) {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            let i = 0;
            element.innerHTML = '';
            
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    element.innerHTML += '<span class="typing-cursor"></span>';
                }
            }
            
            type();
        }

        // ================== عداد العلاقة ==================
        function startCounter(startDateStr) {
            const startDate = new Date(startDateStr);
            
            function updateCounter() {
                const now = new Date();
                const diff = now - startDate;
                
                const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365));
                const months = Math.floor((diff % (1000 * 60 * 60 * 24 * 365)) / (1000 * 60 * 60 * 24 * 30));
                const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 30)) / (1000 * 60 * 60 * 24));
                
                document.getElementById('counterText').innerHTML = `${years} سنة و ${months} شهر و ${days} يوم`;
                
                // تحديث العداد الديناميكي
                const dynamicCounter = document.getElementById('dynamicCounter');
                if (dynamicCounter) {
                    dynamicCounter.innerHTML = `
                        <div class="counter-item">
                            <div class="counter-number">${years}</div>
                            <div class="counter-label">سنة</div>
                        </div>
                        <div class="counter-item">
                            <div class="counter-number">${months}</div>
                            <div class="counter-label">شهر</div>
                        </div>
                        <div class="counter-item">
                            <div class="counter-number">${days}</div>
                            <div class="counter-label">يوم</div>
                        </div>
                    `;
                }
            }
            
            updateCounter();
            setInterval(updateCounter, 86400000);
        }

        // ================== تجهيز الموسيقى ==================
        function setupMusic() {
            const musicBlock = albumData.blocks?.find(b => b.type === 'music');
            
            if (musicBlock?.content) {
                audio.src = musicBlock.content;
                document.getElementById('musicFloat').style.display = 'flex';
                document.getElementById('musicTooltip').textContent = 'أغنية حبنا';
            }
        }

        // ================== تشغيل/إيقاف الموسيقى ==================
        function toggleMusic() {
            if (isPlaying) {
                audio.pause();
                document.getElementById('musicIcon').className = 'fas fa-play';
            } else {
                audio.play().catch(e => console.log('ممنوع التشغيل التلقائي'));
                document.getElementById('musicIcon').className = 'fas fa-pause';
            }
            isPlaying = !isPlaying;
        }

        // ================== التحقق من كلمة السر ==================
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            
            if (input === albumData?.password) {
                document.getElementById('passwordScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('passwordScreen').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    
                    // تشغيل الموسيقى تلقائي
                    setTimeout(() => {
                        audio.play().catch(e => console.log('ممنوع التشغيل التلقائي'));
                        isPlaying = true;
                        document.getElementById('musicIcon').className = 'fas fa-pause';
                    }, 1000);
                }, 500);
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorMessage').style.display = 'none';
                }, 3000);
            }
        }

        // ================== قلوب متحركة ==================
        function startHearts() {
            setInterval(() => {
                const container = document.getElementById('heartsBg');
                const heart = document.createElement('div');
                heart.className = 'heart-bg';
                heart.innerHTML = '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 10 + 10) + 's';
                heart.style.fontSize = (Math.random() * 15 + 10) + 'px';
                container.appendChild(heart);
                
                setTimeout(() => heart.remove(), 15000);
            }, 2000);
        }

        // ================== هيدر متحرك ==================
        window.addEventListener('scroll', () => {
            const header = document.getElementById('mainHeader');
            if (window.scrollY > 100) {
                header.classList.add('floating');
            } else {
                header.classList.remove('floating');
            }
        });

        // ================== عرض خطأ ==================
        function showError(title, message) {
            document.getElementById('loadingScreen').style.display = 'none';
            
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-page';
            errorDiv.innerHTML = `
                <div class="error-box">
                    <i class="fas fa-heart-broken"></i>
                    <h2>${title}</h2>
                    <p>${message}</p>
                    <button onclick="location.href='/'">العودة للرئيسية</button>
                </div>
            `;
            document.body.appendChild(errorDiv);
        }

        // ================== بدء التطبيق ==================
        window.onload = loadAlbum;
    </script>
</body>
</html>
